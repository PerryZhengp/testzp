############################################
# Base Environment
############################################
base.protocol=http
base.host=192.168.0.90
base.port=80
base.path=/api

############################################
# Business Fixed Inputs
############################################
courseId=2032055666142167042
teachingTaskId=2033505568785190913
blockId=3O00nCpPKp

############################################
# Auth & Client Headers
############################################
auth.prefix=Bearer 
clientKey=test-client
clientVersion=V1.0
clientVersionAlt=v1.0
clientVersionAlt2=1.0.0

############################################
# Data Files (relative to project root)
############################################
accounts.file=jmeter/data/accounts.csv
mapping.file=jmeter/data/account_report_mapping.csv
# Save custom sampler variables into JTL for troubleshooting
sample_variables=username,answerSignature

############################################
# Functional Threads
############################################
functional.threads=4
functional.rampup=2
functional.loops=1

############################################
# Keepalive Threads
############################################
keepalive.threads=1
keepalive.rampup=1
keepalive.heartbeats=6
keepalive.interval.seconds=10
keepalive.expire.wait.seconds=35

############################################
# Exception Threads
############################################
exception.threads=1
exception.rampup=1
exception.loops=1

############################################
# Performance - Login Focus
############################################
perf.login.threads=8
perf.login.rampup=10
perf.login.duration.seconds=300

############################################
# Performance - saveQuestionAnswer Focus
############################################
perf.answer.threads=8
perf.answer.rampup=10
perf.answer.duration.seconds=600

############################################
# Performance - Mixed Long Session (4 accounts)
############################################
perf.mixed.threads=4
perf.mixed.rampup=5
perf.mixed.duration.seconds=1800
perf.mixed.heartbeat.seconds=10

############################################
# Random subtitleAnswer constraints
############################################
answer.min=1
answer.max=9999

############################################
# Dynamic/Static payload mode
# dynamic mode first, then fallback template
############################################
answer.payload.mode=hybrid
answer.fallback.single.blockId=oaXh7gOyKt
answer.fallback.single.blockType=SingleChoice
